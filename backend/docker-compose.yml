services:
  postgres:
    # Cached locally — avoids Docker Hub when offline
    image: postgres:16
    container_name: cococare-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cococare
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d cococare']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
